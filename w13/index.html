<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 13 - Async Fit - Pub</title>
    <script defer src="main.js"></script>
</head>

<body>
    <main>
        <form id="form">
            <fieldset>
                <legend>Time to get FIT!</legend>
                <p class="block"></p>
                    <label>Type of Exercise</label>
                    <input name="type" type="text" required>
                <p>
                <p class="block" >
                    <label>Target Number of Reps</label>
                    <input name="reps" type="number" required>
                </p>
                <p class="block"></p>
                    <label>Time in Minutes</label>
                    <input name="time" type="number" required>
            </p>
            <p class="block">
                <label>Get Ready</label>
                <button>Submit</button>
            </p>
        </fieldset>
    </form>


        <section class="center" id="output">
            <h2>Submit to start!</h2>
        </section>
    </main>
</body>

</html>
